
services:
  backend:
    build: 
      context: ./backend 
    container_name: dashboard-api
    restart: always
    ports:
      - "8085:8085"
    env_file: .env 
    volumes:
      - dashboard_db:/app/data


  frontend:
    build:
      context: ./frontend 
    container_name: dashboard-ui
    restart: always
    ports:
      - "8084:8084"


volumes:
  dashboard_db: